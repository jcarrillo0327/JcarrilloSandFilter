<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Sand Flow Simulator</title>
<style>
  body { margin: 0; overflow: hidden; background: #222; }
  #info { position: absolute; top: 10px; left: 10px; color: #fff; font-family: sans-serif; }
  #controls { position: absolute; top: 40px; left: 10px; color: #fff; font-family: sans-serif; }
</style>
</head>
<body>
<div id="info">3D Sand Flow Simulator - Swirl → Venturi → Gravity Chamber</div>
<div id="controls">
  Flow rate: <input type="range" id="flowRate" min="0.5" max="3" step="0.1" value="1"> bbl/min<br>
  Sand conc: <input type="range" id="sandConc" min="50" max="500" step="10" value="150"> ppm
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r148/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ---------- Scene setup ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 4);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ---------- Geometry ----------
const chamberLength = 12; // ft total
const chamberRadius = 0.333; // 4" diameter
const particleCount = 500;

let flowRate = 1.0; // bbl/min
let sandConc = 150; // ppm

// ---------- Particles ----------
const particles = [];
const particleGeometry = new THREE.SphereGeometry(0.01, 6, 6);
const particleMaterial = new THREE.MeshBasicMaterial({color: 0xffaa00});

for(let i=0;i<particleCount;i++){
    let p = new THREE.Mesh(particleGeometry, particleMaterial);
    p.position.set(0, (Math.random()-0.5)*chamberRadius, (Math.random()-0.5)*chamberRadius);
    p.userData = {vx: 0.1, vy:0, vz:0, captured:false};
    scene.add(p);
    particles.push(p);
}

// ---------- Chamber visual ----------
const chamberGeometry = new THREE.CylinderGeometry(chamberRadius, chamberRadius, chamberLength, 32, 1, true);
const chamberMaterial = new THREE.MeshBasicMaterial({color:0x555555, wireframe:true, transparent:true, opacity:0.3});
const chamberMesh = new THREE.Mesh(chamberGeometry, chamberMaterial);
chamberMesh.rotation.x = Math.PI/2;
chamberMesh.position.z = chamberLength/2 - 1;
scene.add(chamberMesh);

// ---------- Animation ----------
function animate(){
    requestAnimationFrame(animate);
    controls.update();

    // Update particles
    particles.forEach(p => {
        if(p.userData.captured) return;

        // Stage 1: Swirl chamber (0 - 2 ft)
        if(p.position.z < 2){
            p.userData.vx = 0.05;
            p.userData.vy = -0.3*p.position.x;
            p.userData.vz = 0.3*p.position.y;
            if(Math.random()<0.01) p.userData.captured = true;
        }
        // Stage 2: Venturi nozzle (2-2.5 ft)
        else if(p.position.z >=2 && p.position.z <2.5){
            p.userData.vx = 0.25;
            p.userData.vy *=0.2;
            p.userData.vz *=0.2;
        }
        // Stage 3: Gravity drop chamber
        else{
            p.userData.vx = 0.1;
            p.userData.vy += (Math.random()-0.5)*0.002;
            p.userData.vz += (Math.random()-0.5)*0.002;
            // Simple gravity dropout
            if(p.position.y < -chamberRadius*0.8 && Math.random()<0.03) p.userData.captured=true;
        }

        // Move particle
        p.position.x += p.userData.vx*0.05*flowRate;
        p.position.y += p.userData.vy*0.05*flowRate;
        p.position.z += p.userData.vz*0.05*flowRate;

        // Wall collisions
        let r = Math.sqrt(p.position.x*p.position.x + p.position.y*p.position.y + p.position.z*p.position.z);
        if(Math.abs(p.position.x) > chamberRadius) p.userData.vx*=-0.8;
        if(Math.abs(p.position.y) > chamberRadius) p.userData.vy*=-0.8;
        if(Math.abs(p.position.z) > chamberLength) p.userData.vz*=-0.8;
    });

    renderer.render(scene, camera);
}

animate();

// ---------- UI controls ----------
document.getElementById("flowRate").addEventListener("input", (e)=>{
    flowRate = parseFloat(e.target.value);
});
document.getElementById("sandConc").addEventListener("input", (e)=>{
    sandConc = parseFloat(e.target.value);
});
</script>
</body>
</html>
